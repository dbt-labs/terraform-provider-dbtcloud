# When a new issue is opened or an issue is labeled "bug", notify for triage:
# - Optionally call Runlayer webhook (set RUNLAYER_WEBHOOK_URL secret) with issue payload
# - Add label "needs-triage" and comment so the agent can be run in Cursor with the dbtcloud-provider-support skill
name: Bug triage

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.label.name == 'bug'
    steps:
      - name: Call Runlayer webhook (optional)
        if: env.RUNLAYER_URL != ''
        env:
          RUNLAYER_URL: ${{ secrets.RUNLAYER_WEBHOOK_URL }}
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const url = process.env.RUNLAYER_URL;
            if (!url) return;
            const issue = context.payload.issue;
            await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                issue_number: issue.number,
                issue_url: issue.html_url,
                title: issue.title,
                body: issue.body || '',
                repository: context.repo.owner + '/' + context.repo.repo
              })
            });

      - name: Add needs-triage label
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            })

      - name: Comment with triage instructions
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Bug triage

            Use the **dbtcloud-provider-support** skill in Cursor to triage this issue, implement the fix, run tests, and open a PR (do not merge).

            - Issue: #${{ github.event.issue.number }}
            - Repo: \`${{ github.repository }}\`
            `;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
