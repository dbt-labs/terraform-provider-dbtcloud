# When a new issue is opened or an issue is labeled "bug", notify for triage:
# - Optionally call Runlayer API (secrets: DBT_RUNLAYER_URL, DBT_RUNLAYER_API_KEY). If Runlayer has no public trigger URL, leave DBT_RUNLAYER_URL unset and this step is skipped.
# - Add label "needs-triage" and comment so the agent can be run in Cursor with the dbtcloud-provider-support skill
name: Bug triage

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.label.name == 'bug'
    steps:
      # Runs only when DBT_RUNLAYER_URL is set. If Runlayer doesn't document a trigger endpoint yet, leave URL unset; label + comment still run.
      - name: Notify Runlayer via API (optional)
        if: env.DBT_RUNLAYER_URL != ''
        env:
          DBT_RUNLAYER_URL: ${{ secrets.DBT_RUNLAYER_URL }}
          DBT_RUNLAYER_API_KEY: ${{ secrets.DBT_RUNLAYER_API_KEY }}
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const url = process.env.DBT_RUNLAYER_URL;
            const apiKey = process.env.DBT_RUNLAYER_API_KEY;
            if (!url || !apiKey) return;
            const issue = context.payload.issue;
            await fetch(url, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey
              },
              body: JSON.stringify({
                issue_number: issue.number,
                issue_url: issue.html_url,
                title: issue.title,
                body: issue.body || '',
                repository: context.repo.owner + '/' + context.repo.repo
              })
            });

      - name: Add needs-triage label
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            })

      - name: Comment with triage instructions
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Bug triage

            Use the **dbtcloud-provider-support** skill in Cursor to triage this issue, implement the fix, run tests, and open a PR (do not merge).

            - Issue: #${{ github.event.issue.number }}
            - Repo: \`${{ github.repository }}\`
            `;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
